<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الرئيسية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 40px 20px;
            gap: 40px;
        }

        .question {
            color: #e0e0e0;
            font-size: 2rem;
            font-weight: 300;
            text-align: center;
            letter-spacing: 1px;
        }

        .buttons-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 16px 60px;
            font-size: 1.2rem;
            border: 1px solid #333;
            background: #141414;
            color: #b0b0b0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 1px;
        }

        .btn:hover {
            border-color: #555;
            color: #fff;
            background: #1a1a1a;
            transform: translateY(-2px);
        }
    </style>
<base target="_blank">
</head>
<body>
    <h1 class="question">ما الذي تريد الوصول إليه؟</h1>

    <div class="buttons-container">
        <a href="page2.html" class="btn">الإجابة الأولى</a>
        <a href="buttons.html" class="btn">الإجابة الثانية</a>
    </div>
</body>
</html>
