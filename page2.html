<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة فارغة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 40px 20px;
        }

        .content {
            max-width: 700px;
            color: #c0c0c0;
            font-size: 1.3rem;
            line-height: 2.2;
            text-align: center;
            font-weight: 300;
        }

        .back {
            margin-top: 50px;
            padding: 12px 40px;
            font-size: 1rem;
            border: 1px solid #333;
            background: #141414;
            color: #888;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-decoration: none;
            display: inline-block;
        }

        .back:hover {
            border-color: #555;
            color: #fff;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="content">
        هذا هو الكلام الذي يظهر عند اختيار الإجابة الأولى.<br>
        يمكنك تعديل هذا النص كما تشاء.<br>
        الصفحة نظيفة ولا تحتوي على أي أزرار.<br>
        فقط نص بسيط وأنيق.
    </div>

    <a href="index.html" class="back">العودة</a>
</body>
</html>
